name: 'Foundry Package Release'
description: 'Publish Foundry VTT packages via the Foundry API'
author: 'neovatar'

inputs:
  name:
    description: 'Name to greet'
    required: true
    default: 'World'
  greeting:
    description: 'Greeting to use'
    required: false
    default: 'Hello'

outputs:
  message:
    description: 'The message produced by the action'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/neovatar/foundry-package-release@sha256:c78370d107d611ef9ed51e9c285c421970958df1f621f341245d99ffa9027b6c'

branding:
  icon: 'upload-cloud'
  color: 'purple'
