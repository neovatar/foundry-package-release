name: 'Foundry Package Release'
description: 'Publish Foundry VTT packages via the Foundry API'
author: 'neovatar'

inputs:
  name:
    description: 'Name to greet'
    required: true
    default: 'World'
  greeting:
    description: 'Greeting to use'
    required: false
    default: 'Hello'

outputs:
  message:
    description: 'The message produced by the action'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/neovatar/foundry-package-release@sha256:9c1277d46fddcddd26877dc2ab467454479bb9b216a166dd8ae8541ac410d826'

branding:
  icon: 'upload-cloud'
  color: 'purple'
