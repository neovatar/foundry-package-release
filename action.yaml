name: 'Foundry Package Release'
description: 'Publish Foundry VTT packages via the Foundry API'
author: 'neovatar'

inputs:
  id:
    description: 'The package ID, as found in its manifest'
    required: true
  version:
    description: 'The semantic version of this release (e.g. "1.0.0")'
    required: true
  manifest:
    description: 'URL to the manifest for this specific release (not the latest/rolling manifest)'
    required: true
  notes:
    description: 'URL to the release notes for this release'
    required: false
  compat_min:
    description: 'Minimum Foundry VTT version this release is compatible with'
    required: true
  compat_verified:
    description: 'Most recent Foundry VTT version this release has been verified against'
    required: true
  compat_max:
    description: 'Foundry VTT version at which this release is no longer compatible'
    required: false
  dry_run:
    description: 'Validate the release without publishing it'
    required: false
    default: 'true'

outputs:
  status:
    description: 'The status returned by the Foundry package release API ("success" or "error")'
  page:
    description: 'URL of the package edit page returned by the API'
  message:
    description: 'Message returned by the API (populated on dry runs)'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/neovatar/foundry-package-release@sha256:edda628b183e93d6bb0ed567f313d40dfbb3addc4914daac2fc2a93def1902d4'

branding:
  icon: 'upload-cloud'
  color: 'purple'
