name: Build Docker image

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", ".github/dependabot.yml"]
  pull_request:
    branches: [main]
    paths-ignore: ["README.md", ".github/dependabot.yml"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d%H%M%S')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin image digest in action.yml
        if: github.event_name != 'pull_request'
        run: |
          DIGEST="${{ steps.docker_build.outputs.digest }}"
          IMAGE="docker://ghcr.io/${IMAGE_NAME}@${DIGEST}"
          sed -i "s|image: 'docker://ghcr.io/[^']*'|image: '${IMAGE}'|" action.yml

      - name: Commit and push
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet action.yml; then
            git add action.yml
            git commit -m "ci: pin action image to ${{ steps.docker_build.outputs.digest }} [skip ci]"
            git push
          fi
          git tag -f ${{ steps.version.outputs.version }}
          git push -f origin ${{ steps.version.outputs.version }}
